<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anu</title>
    <style>
        body { background: #000; color: #00f5ff; font-family: monospace; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #log { height: 200px; width: 85%; overflow-y: auto; border: 1px solid #00f5ff; padding: 15px; margin: 20px 0; background: rgba(0, 245, 255, 0.05); font-size: 0.9rem; text-align: left; border-radius: 8px; }
        button { background: transparent; color: #00f5ff; border: 2px solid #00f5ff; padding: 15px 40px; cursor: pointer; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        button:hover { background: #00f5ff; color: #000; }
        #status { color: #fff; margin-bottom: 10px; font-size: 1.2rem; letter-spacing: 3px; }
        .anu-msg { color: #00f5ff; font-weight: bold; }
        .sys-msg { color: #ffaa00; }
    </style>
</head>
<body>

    <h1 style="font-size: 3rem; margin: 0;">anu</h1>
    <div id="status">OFFLINE</div>
    <button id="startBtn">Initialize</button>
    <div id="log"></div>

    <script>
        // PASTE YOUR REAL KEY BELOW
        const API_KEY = "YOUR_KEY_HERE"; 

        const log = document.getElementById("log");
        const statusEl = document.getElementById("status");
        const startBtn = document.getElementById("startBtn");

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0;
            utter.pitch = 1.0;
            window.speechSynthesis.speak(utter);
        }

        function addLog(sender, text, isError = false) {
            const div = document.createElement('div');
            if(isError) div.style.color = "#ff4444";
            div.innerHTML = `<span class="${sender === 'anu' ? 'anu-msg' : 'sys-msg'}">> ${sender}:</span> ${text}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        async function getAIResponse(input) {
            statusEl.innerText = "THINKING";
            if (API_KEY === "YOUR_KEY_HERE") {
                addLog("SYSTEM", "Error: Key not pasted in code.", true);
                speak("Sir, you have not provided my API key in the source code yet.");
                return;
            }

            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{ role: "system", content: "Your name is anu. You are a helpful AI like Jarvis. Be brief." }, { role: "user", content: input }]
                    })
                });
                const data = await res.json();
                if (data.error) {
                    addLog("SYSTEM", data.error.message, true);
                } else {
                    const reply = data.choices[0].message.content;
                    addLog("anu", reply);
                    speak(reply);
                }
            } catch (e) {
                addLog("SYSTEM", "Connection failed.", true);
            }
            statusEl.innerText = "LISTENING";
        }

        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            addLog("YOU", transcript);
            getAIResponse(transcript);
        };

        recognition.onend = () => { recognition.start(); };

        startBtn.addEventListener('click', () => {
            recognition.start();
            startBtn.style.display = "none";
            statusEl.innerText = "LISTENING";
            speak("System online. I am anu.");
            addLog("SYSTEM", "anu is now active.");
        });
    </script>
</body>
</html>
