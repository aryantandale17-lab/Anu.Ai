<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anu</title>
    <style>
        body { background: #000; color: #00f5ff; font-family: 'Courier New', monospace; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #log { height: 220px; width: 85%; overflow-y: auto; border: 1px solid #00f5ff; padding: 15px; margin: 20px 0; background: rgba(0, 245, 255, 0.08); font-size: 0.9rem; text-align: left; border-radius: 10px; box-shadow: inset 0 0 10px #00f5ff; }
        button { background: #00f5ff; color: #000; border: none; padding: 18px 50px; cursor: pointer; font-size: 1.3rem; font-weight: bold; text-transform: uppercase; border-radius: 5px; box-shadow: 0 0 20px #00f5ff; transition: 0.2s; }
        button:active { transform: scale(0.95); box-shadow: 0 0 5px #00f5ff; }
        #status { color: #fff; margin-bottom: 10px; font-size: 1.2rem; letter-spacing: 4px; text-transform: uppercase; }
        .anu-msg { color: #00f5ff; font-weight: bold; }
        .sys-msg { color: #ffaa00; }
        h1 { font-size: 4rem; margin: 0; letter-spacing: 8px; text-shadow: 0 0 15px #00f5ff; }
    </style>
</head>
<body>

    <h1>anu</h1>
    <div id="status">System Offline</div>
    <button id="startBtn">Initialize</button>
    <div id="log"></div>

    <script>
        const API_KEY = "Sk-proj-TuxidXAUmeO42FIc6lQcFO44e-7HamdZ_EZYVcEOB5EA0M-R0r9Xb7OEWUWrAUQXPkafXtetRsT3BlbkFJBI58sRqkzR443Pl4CUrVda_qymhQupGisCszqFOd554QOglxzjcGMQln4yImHFFjW4DgRurEgA"; 

        const log = document.getElementById("log");
        const statusEl = document.getElementById("status");
        const startBtn = document.getElementById("startBtn");

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.0;
            utter.pitch = 1.1;
            window.speechSynthesis.speak(utter);
        }

        function addLog(sender, text, isError = false) {
            const div = document.createElement('div');
            div.style.marginBottom = "8px";
            if(isError) div.style.color = "#ff4444";
            div.innerHTML = `<span class="${sender === 'anu' ? 'anu-msg' : 'sys-msg'}">> ${sender}:</span> ${text}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        async function getAIResponse(input) {
            statusEl.innerText = "Processing...";
            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: "Your name is anu. You are a loyal AI assistant. Keep responses very short. Address the user as Sir." },
                            { role: "user", content: input }
                        ]
                    })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    addLog("SYSTEM", "OpenAI Error: " + data.error.message, true);
                    speak("Sir, please check your OpenAI account balance.");
                } else {
                    const reply = data.choices[0].message.content;
                    addLog("anu", reply);
                    speak(reply);
                }
            } catch (e) {
                addLog("SYSTEM", "Network failure. Check connection.", true);
            }
            statusEl.innerText = "Listening...";
        }

        const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        if (!SpeechRecognition) {
            addLog("SYSTEM", "Error: Browser doesn't support Voice.", true);
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                addLog("YOU", transcript);
                getAIResponse(transcript);
            };

            recognition.onend = () => { if(statusEl.innerText !== "OFFLINE") recognition.start(); };

            startBtn.addEventListener('click', () => {
                recognition.start();
                startBtn.style.display = "none";
                statusEl.innerText = "Listening...";
                speak("anu is online. How can I help you today, sir?");
                addLog("SYSTEM", "Voice link established.");
            });
        }
    </script>
</body>
</html>
